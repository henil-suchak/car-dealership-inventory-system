services:
  postgres:
    image: postgres:16-alpine
    container_name: dealership-db
    environment:
      POSTGRES_USER: dealership_user
      POSTGRES_PASSWORD: dealership_password
      POSTGRES_DB: dealership_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: